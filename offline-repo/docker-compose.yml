services:
  # Serves the flat apt repo built by playbooks/build_offline_repo.yml -
  # this whole offline-repo/ directory is meant to be portable: build it
  # once somewhere with real internet access, then copy the directory
  # (this compose file + packages/, already populated) to wherever you'll
  # actually install Vault from, and `docker-compose up -d` there. No
  # internet needed at install time once this is running.
  offline-apt:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./packages:/usr/share/nginx/html:ro
      - ./nginx-autoindex.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
