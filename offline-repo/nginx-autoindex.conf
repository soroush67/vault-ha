# Overrides nginx:alpine's own /etc/nginx/conf.d/default.conf at the same
# path, rather than mounting a separate nginx.conf - a stock default.conf's
# `server_name localhost` otherwise silently wins over a catch-all `_` on
# any request with a plain "Host: localhost" header (hit this exact gotcha
# building kubespray-webui's own Offline Install tab - see that project's
# CLAUDE.md gotcha #4 for the full story).
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    autoindex on;
}
