---
# Enables/disables a Vault secrets engine mount (kv, database, pki, ssh,
# transit, ...) at a given path - the generic "turn this engine on/off"
# step every engine type shares. What you do with it afterward (KV
# writes, a PKI root CA + roles, a database connection + roles, ...) is
# entirely engine-specific and left to you - same "this repo stands up
# Vault, not what you store in it" boundary as the rest of this project
# (see README.md "Known gaps").
#
# Same style as playbooks/enable_audit.yml: targets vault_cluster[0] only
# (secrets engine mounts are cluster-wide, stored in Raft), shells out to
# the real vault CLI, safe to re-run.
#
# Enable a KV v2 engine at secret/:
#   ansible-playbook -i <inventory> playbooks/manage_secrets_engine.yml \
#     -e vault_root_token=<root or a sufficiently privileged token> \
#     -e target_engine_type=kv \
#     -e target_engine_path=secret \
#     -e target_engine_version=2
#
# Enable a PKI engine at pki/ with a 10-year max lease:
#   ansible-playbook -i <inventory> playbooks/manage_secrets_engine.yml \
#     -e vault_root_token=<token> \
#     -e target_engine_type=pki \
#     -e target_engine_max_lease_ttl=87600h
#
# Disable an engine (all its data is gone, no undo):
#   ansible-playbook -i <inventory> playbooks/manage_secrets_engine.yml \
#     -e vault_root_token=<token> \
#     -e target_engine_path=secret \
#     -e target_state=absent
- name: Manage a Vault secrets engine mount
  hosts: vault_cluster[0]
  become: true
  gather_facts: false
  vars:
    target_state: present
    target_engine_description: ""
    target_engine_version: ""
    target_engine_default_lease_ttl: ""
    target_engine_max_lease_ttl: ""
    vault_scheme: "{{ 'https' if (vault_tls_enabled | bool) else 'http' }}"
    vault_ca_cert_flag: "{{ ('-ca-cert=' + vault_tls_dir + '/ca.pem') if (vault_tls_enabled | bool) else '' }}"
  environment:
    VAULT_ADDR: "{{ vault_scheme }}://{{ ansible_host }}:{{ vault_api_port }}"
    VAULT_TOKEN: "{{ vault_root_token | default('') }}"
  tasks:
    - name: Resolve the mount path (defaults to the engine type, same as Vault's own CLI default)
      ansible.builtin.set_fact:
        target_engine_path: "{{ target_engine_path | default(target_engine_type | default(''), true) }}"

    - name: Require the fields this playbook actually needs
      ansible.builtin.fail:
        msg: >-
          Pass -e vault_root_token=... -e target_engine_path=... (or
          target_engine_type, which the path defaults to) and, for
          target_state=present, also -e target_engine_type=<kv|database|pki|...>.
      when: >
        (vault_root_token | default('') | length == 0) or
        (target_engine_path | length == 0) or
        (target_state == 'present' and (target_engine_type | default('') | length == 0))

    - name: Check which secrets engines are already mounted
      ansible.builtin.command:
        cmd: "vault secrets list {{ vault_ca_cert_flag }} -format=json"
      register: vault_secrets_list
      changed_when: false

    - name: Enable the secrets engine
      when: >
        target_state == "present" and
        (target_engine_path ~ '/') not in (vault_secrets_list.stdout | from_json)
      ansible.builtin.command:
        cmd: >-
          vault secrets enable {{ vault_ca_cert_flag }}
          -path={{ target_engine_path }}
          {{ '-description=' + target_engine_description if target_engine_description | length > 0 else '' }}
          {{ '-version=' + target_engine_version | string if target_engine_version | string | length > 0 else '' }}
          {{ '-default-lease-ttl=' + target_engine_default_lease_ttl if target_engine_default_lease_ttl | length > 0 else '' }}
          {{ '-max-lease-ttl=' + target_engine_max_lease_ttl if target_engine_max_lease_ttl | length > 0 else '' }}
          {{ target_engine_type }}

    - name: Disable the secrets engine (ALL data under this mount is gone, no undo)
      ansible.builtin.command:
        cmd: "vault secrets disable {{ vault_ca_cert_flag }} {{ target_engine_path }}"
      when: >
        target_state == "absent" and
        (target_engine_path ~ '/') in (vault_secrets_list.stdout | from_json)

    - name: Confirm current secrets engines
      ansible.builtin.command:
        cmd: "vault secrets list {{ vault_ca_cert_flag }} -format=json"
      register: vault_secrets_list_after
      changed_when: false

    - name: Show mounted secrets engines
      ansible.builtin.debug:
        var: vault_secrets_list_after.stdout | from_json
