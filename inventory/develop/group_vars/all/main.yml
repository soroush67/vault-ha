---
# --- Vault version / packaging ---
vault_version: "1.21.4"
vault_apt_codename: "{{ ansible_facts['distribution_release'] }}"

# --- Cluster ---
vault_cluster_name: "vault-dev"
# Integrated Storage (Raft) - no external Consul cluster needed. Works
# the same with a single node as with three - it just bootstraps as its
# own Raft leader on `vault operator init`, with no peers to retry_join.
vault_api_port: 8200
vault_cluster_port: 8201

# --- Storage / paths ---
vault_data_dir: /opt/vault/data
vault_config_dir: /etc/vault.d
vault_tls_dir: /etc/vault.d/tls
vault_log_level: "info"

# --- UI ---
# The whole point of this setup, per the user's explicit request: use
# Vault's own built-in web UI (a single `ui = true` config line) rather
# than building a separate custom UI project.
vault_ui_enabled: true

# --- TLS ---
# Self-signed CA generated once by roles/vault_tls (on the control node,
# not on any Vault host) and distributed to every node - real Vault
# deployments should always use TLS, this isn't optional. Bring your own
# CA/certs instead by skipping roles/vault_tls and dropping files at
# {{ vault_tls_dir }}/{ca.pem,cert.pem,key.pem} yourself before running
# roles/vault_install.
vault_tls_cert_days: 3650

# No HAProxy vars here - this environment has a single Vault node, nothing
# to load-balance across, and no haproxy_lb group in this inventory.
# playbooks/site_develop.yml doesn't configure HAProxy at all (unlike
# playbooks/site.yml).

# --- Offline install ---
# Set to true to install vault/haproxy/their dependencies from a portable
# offline apt repo (offline-repo/, built once by
# playbooks/build_offline_repo.yml on a machine with real internet access)
# instead of the real internet-facing HashiCorp/Ubuntu repos. See
# README.md "Offline install" for the full workflow.
vault_offline_mode: false
# Reachable from every vault_cluster/haproxy_lb host - point this at
# wherever offline-repo/'s docker-compose is actually running.
vault_offline_repo_url: "http://CHANGE_ME:8081"
