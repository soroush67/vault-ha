# Sample inventory for a single-node develop environment - one Vault node,
# no HAProxy (nothing to load-balance across with only one node). Same
# roles/config as the real 3-node cluster otherwise (real TLS, real Raft
# storage) - just one member instead of three. Replace ansible_host with
# a real IP before use. Use playbooks/site_develop.yml with this, not
# playbooks/site.yml (which also configures haproxy_lb).

[vault_cluster]
vault-dev ansible_host=10.30.40.11

# Empty on purpose - a host to add to this cluster later goes here, then
# run playbooks/add_node.yml. See README.md "Scaling the cluster".
[new_members]

[vault_cluster:vars]
ansible_user=devops
ansible_port=22
