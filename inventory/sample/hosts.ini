# Sample inventory - replace ansible_host with real IPs before use.
# 3-node Vault cluster (Integrated Storage/Raft - no external Consul
# needed), fronted by one HAProxy load balancer that health-checks each
# node's real Vault state (active/standby/sealed) via /v1/sys/health.
# 3 is Vault's own documented minimum for real HA (tolerates 1 node down
# while keeping Raft quorum) - see README.md for going to 5.

[vault_cluster]
vault1 ansible_host=10.30.40.11
vault2 ansible_host=10.30.40.12
vault3 ansible_host=10.30.40.13

[haproxy_lb]
lb1 ansible_host=10.30.40.20

# Empty on purpose - a host to add to the existing Raft cluster goes here,
# then run playbooks/add_node.yml. See README.md "Scaling the cluster".
[new_members]

[vault_cluster:vars]
ansible_user=devops
ansible_port=22

[haproxy_lb:vars]
ansible_user=devops
ansible_port=22
